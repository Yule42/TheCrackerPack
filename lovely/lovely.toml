[manifest]
version = "1.0.0"
dump_lua = true
priority = 1

    # Start
[[patches]]
[patches.pattern]
target = "main.lua"
pattern = '''function love.load()'''
position = "before"
payload = '''
Cracker = {}
Cracker.food = {}
'''
match_indent = true
times = 1

    # New scoring context
[[patches]]
[patches.pattern]
target = 'card.lua'
match_indent = true
pattern = '''if self.seal == 'Blue' and #G.consumeables.cards + G.GAME.consumeable_buffer < G.consumeables.config.card_limit and not self.ability.extra_enhancement then'''
position = 'after'
payload = '''
for i=1, #G.jokers.cards do
    eval_card(G.jokers.cards[i], {cardarea = G.jokers, cracker_seal_trigger = true, seal = 'Blue'})
end
'''

[[patches]]
[patches.pattern]
target = 'card.lua'
match_indent = true
pattern = '''elseif self.seal == 'Gold' and not self.ability.extra_enhancement then'''
position = 'after'
payload = '''
for i=1, #G.jokers.cards do
    eval_card(G.jokers.cards[i], {cardarea = G.jokers, cracker_seal_trigger = true, seal = 'Gold'})
end
'''

[[patches]]
[patches.pattern]
target = 'card.lua'
match_indent = true
pattern = '''if self.seal == 'Red' then'''
position = 'after'
payload = '''
if not context.end_of_round or next(self:get_end_of_round_effect(context)) then
    for i=1, #G.jokers.cards do
        eval_card(G.jokers.cards[i], {cardarea = G.jokers, cracker_seal_trigger = true, seal = 'Red'})
    end
end
'''

    # The End challenge
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "elseif v.id == 'no_shop_jokers' then"
position = "before"
payload = """
elseif v.id == 'plasma_2' then
    G.GAME.starting_params.ante_scaling = 2
"""
match_indent = true
times = 1

    # New scoring context
[[patches]]
[patches.pattern]
target = 'functions/button_callbacks.lua'
pattern = '''if card.children.use_button then card.children.use_button:remove(); card.children.use_button = nil end'''
match_indent = true
position = 'before'
payload = '''
if card.area == G.pack_cards then
    for i=1, #G.jokers.cards do
        eval_card(G.jokers.cards[i], {taking_booster_card = true})
    end
end'''

    # Circus Act challenge
[[patches]]
[patches.pattern]
target = "game.lua"
pattern = "elseif v.id == 'no_shop_jokers' then"
position = "before"
payload = """
elseif v.id == 'onlyjokers' then
    self.GAME.tarot_rate = 0
    self.GAME.planet_rate = 0
"""
match_indent = true
times = 1

    # Mail Call challenge
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "if G.GAME.modifiers.debuff_played_cards then"
position = "before"
payload = """
if G.GAME.modifiers.debuff_played_unsealed_cards then 
    for i = 1, #scoring_hand do
        if not scoring_hand[i].seal then
            scoring_hand[i].ability.perma_debuff = true
        end
    end
end
"""
match_indent = true
times = 1

    # Ghost in a Pack challenge
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "if G.GAME.modifiers.all_eternal then"
position = "before"
payload = """
if G.GAME.modifiers.all_perishable then
    card:set_perishable(true)
end
"""
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = "local center = G.P_CENTERS.b_red"
position = "before"
payload = """
if G.GAME.modifiers.spectral_replace_arcana and _type == "Tarot" then
    _type = "Spectral"
end
"""
match_indent = true



    # DX Blinds
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''for k, v in pairs(G.GAME.bosses_used) do'''
position = "before"
match_indent = true
payload = '''
for k, v in pairs(eligible_bosses) do
    if v and G.GAME.bosses_used[k] == nil then
        G.GAME.bosses_used[k] = 0
    end
end

if Cracker.force_dx_blind() then
    if G.GAME.round_resets.ante%2 == 1 then
        return 'bl_cracker_major'
    else
        for k, v in pairs(eligible_bosses) do
            if eligible_bosses[k] and not (G.P_BLINDS[k] and G.P_BLINDS[k].boss and G.P_BLINDS[k].boss.dx) then
                eligible_bosses[k] = nil
            end
        end
    end
else
    for k, v in pairs(eligible_bosses) do
        if eligible_bosses[k] and (G.P_BLINDS[k] and G.P_BLINDS[k].boss and G.P_BLINDS[k].boss.dx) then
            eligible_bosses[k] = nil
        end
    end
end
'''


    # New Context
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "G.GAME.current_round.discards_used = G.GAME.current_round.discards_used + 1"
position = "after"
match_indent = true
payload = '''
SMODS.calculate_context({ cracker_after_discard = true })
'''


    # "First hand played this ante"
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "G.GAME.hands[text].played_this_ante = G.GAME.hands[text].played_this_ante + 1"
position = "after"
match_indent = true
payload = '''
if not G.GAME.first_hand_played then
    G.GAME.first_hand_played = text
end
'''



[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "G.GAME.voucher_restock = nil"
position = "after"
match_indent = true
payload = '''
G.GAME.first_hand_played = nil
'''

    # Track if card has been played
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "v.ability.played_this_ante = true"
position = "after"
match_indent = true
payload = '''
v.ability.played_ever = true
'''


[[patches]]
[patches.pattern]
target = "blind.lua"
pattern = "if self.name == 'Crimson Heart' and not self.disabled and card.area == G.jokers then "
position = "at"
match_indent = true
payload = '''
if (self.name == 'Crimson Heart' or self.name == 'The Head DX') and not self.disabled and card.area == G.jokers then 
'''

[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/game_object.lua"]'''
match_indent = true
position = 'after'
pattern = '''
if (key == 'chips' or key == 'h_chips' or key == 'chip_mod') and amount then
'''
payload = '''
if G.GAME.blind and G.GAME.blind.name == 'bl_cracker_flint_dx' and not G.GAME.blind.disabled then
    amount = math.floor(amount/2)
end
'''

[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/game_object.lua"]'''
match_indent = true
position = 'after'
pattern = '''
if (key == 'mult' or key == 'h_mult' or key == 'mult_mod') and amount then
'''
payload = '''
if G.GAME.blind and G.GAME.blind.name == 'bl_cracker_flint_dx' and not G.GAME.blind.disabled then
    amount = math.floor(amount/2)
end
'''

[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/game_object.lua"]'''
match_indent = true
position = 'after'
pattern = '''
if (key == 'x_mult' or key == 'xmult' or key == 'Xmult' or key == 'x_mult_mod' or key == 'Xmult_mod') and amount ~= 1 then
'''
payload = '''
if G.GAME.blind and G.GAME.blind.name == 'bl_cracker_flint_dx' and not G.GAME.blind.disabled then -- need to redo this to be better
    amount = math.max(1, math.floor((amount+1)/2))
end
'''

[[patches]]
[patches.pattern]
target = "functions/button_callbacks.lua"
match_indent = true
position = 'at'
pattern = '''
if G.GAME.modifiers.no_blind_reward and (G.GAME.blind and G.GAME.modifiers.no_blind_reward[G.GAME.blind:get_type()]) then
'''
payload = '''
if G.GAME.modifiers.no_blind_reward and (G.GAME.blind and G.GAME.modifiers.no_blind_reward[G.GAME.blind:get_type()] and not G.GAME.modifiers.extra_reward) then
'''

[[patches]]
[patches.pattern]
target = "blind.lua"
match_indent = true
position = 'after'
pattern = '''
if G.GAME.modifiers.no_blind_reward and G.GAME.modifiers.no_blind_reward[self:get_type()] then self.dollars = 0 end
'''
payload = '''
if G.GAME.modifiers.extra_reward then self.dollars = self.dollars + G.GAME.modifiers.extra_reward end
if G.GAME.modifiers.reduced_reward then self.dollars = math.max(0, self.dollars - G.GAME.modifiers.reduced_reward) end
'''

    # Golden Deck
[[patches]]
[patches.pattern]
target = "functions/common_events.lua"
pattern = '''
if (not v.requires or (G.P_CENTERS[v.requires] and G.P_CENTERS[v.requires].discovered)) and 
(not v.min_ante or v.min_ante <= G.GAME.round_resets.ante) then
    add = true
end
'''

position = "after"
match_indent = true
payload = '''
if (G.GAME.modifiers.money_tags_only and not Cracker.money_tags[v.key]) then
    add = nil
end
'''
[[patches]]
[patches.pattern]
